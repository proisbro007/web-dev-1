<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Accessibility</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Main heading clearly describes the page topic -->
  <header>
    <h1>Accessible Web Page</h1>
  </header>

  <main>

    <!-- alt attribute describes the image for screen readers -->
    <img src="student.jpg" alt="Student studying on a laptop">

    <!-- section groups related content with a clear heading -->
    <section>
      <h2>About This Page</h2>
      <p>This page demonstrates key web accessibility techniques so that all users, including those using assistive technology, can access the content.</p>
    </section>

    <!-- Accessible form section -->
    <section>
      <h2>Contact Form</h2>

      <form>

        <!-- label is linked to input via matching for and id attributes -->
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your full name">
        </div>

        <!-- Email input with linked label -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Enter your email">
        </div>

        <!-- Textarea with linked label -->
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="4" placeholder="Write your message here"></textarea>
        </div>

        <!-- aria-label gives the button an accessible name for screen readers -->
        <button type="submit" aria-label="Submit contact form">Submit</button>

      </form>
    </section>

  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 My Website</p>
  </footer>

</body>
</html>
