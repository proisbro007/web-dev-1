<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Layout</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Outer container that holds the CSS Grid layout -->
  <div class="container">

    <!-- Site header - spans full width -->
    <header>
      <h1>My Website</h1>
    </header>

    <!-- Main navigation - left column -->
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Portfolio</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>

    <!-- Main content area - centre column -->
    <main>
      <h2>Main Content</h2>
      <p>This is the main content area. It sits in the centre column of the grid layout.</p>
    </main>

    <!-- Sidebar with extra info - right column -->
    <aside>
      <h3>Sidebar</h3>
      <p>This is a sidebar with extra information alongside the main content.</p>
    </aside>

    <!-- Footer - spans full width -->
    <footer>
      <p>&copy; 2026 My Website</p>
    </footer>

  </div>

</body>
</html>
